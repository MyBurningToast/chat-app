name: Build and Release Chat App

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '9.0.x'

    - name: Restore dependencies
      run: dotnet restore ./ChatApp/ChatApp.sln

    - name: Publish ChatClient
      run: dotnet publish ./ChatApp/ChatClient/ChatClient.csproj -c Release -r win-x64 --self-contained true -o ./publish/client

    - name: Publish ChatServer
      run: dotnet publish ./ChatApp/ChatServer/ChatServer.csproj -c Release -r win-x64 --self-contained true -o ./publish/server

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ github.ref }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload main executables
      run: |
        echo "Uploading ChatClient.exe..."
        gh release upload ${{ github.ref }} ./publish/client/ChatClient.exe --clobber

        echo "Uploading ChatServer.exe..."
        gh release upload ${{ github.ref }} ./publish/server/ChatServer.exe --clobber
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}