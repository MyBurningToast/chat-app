name: Build and Release

on:
  push:
    tags:
      - 'v*'
jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Publish Client
        run: >
          dotnet publish ChatApp/ChatClient/ChatClient.csproj
          -c Release -r win-x64 --self-contained true
          /p:PublishSingleFile=true
          /p:IncludeAllContentForSelfExtract=true
          /p:DebugType=None
          -o publish

      - name: Publish Server
        run: >
          dotnet publish ChatApp/ChatServer/ChatServer.csproj
          -c Release -r win-x64 --self-contained true
          /p:PublishSingleFile=true
          /p:IncludeAllContentForSelfExtract=true
          /p:DebugType=None
          -o publish

      - name: Zip output
        run: Compress-Archive -Path publish\* -DestinationPath publish\ChatApp.zip -Force

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: publish/ChatApp.zip